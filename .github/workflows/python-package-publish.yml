name: Build, Test, and Publish

on:
  push:
    branches:
      - "testwheels*"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  pypi_build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  pypi_build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64 (builds inside manylinux container)
          - os: ubuntu-latest
            cibw_archs: "x86_64"
          # Linux aarch64 (emulated via QEMU)
          - os: ubuntu-latest
            cibw_archs: "aarch64"
          # macOS Intel
          - os: macos-13
            cibw_archs: "x86_64"
          # macOS Apple Silicon
          - os: macos-latest
            cibw_archs: "arm64"
          # Windows x86_64
          - os: windows-latest
            cibw_archs: "AMD64"
          # Windows ARM64 (cross-compiled)
          - os: windows-latest
            cibw_archs: "ARM64"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Required for Linux aarch64 builds
      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_TEST_SKIP: "*-win_arm64"  # Can't test ARM64 on x86_64 runner

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_archs }}
          path: wheelhouse/*.whl

  pypi_upload:
    needs: [pypi_build_sdist, pypi_build_wheels]
    runs-on: ubuntu-latest
    environment: Publish
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: 'wheels-*'
          merge-multiple: true

      - uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: 'sdist'
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
