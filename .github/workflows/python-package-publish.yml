name: Build, Test, and Publish

on:
  push:
    branches:
      - "testwheels*"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  pypi_build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need to clone everything to determine version from git.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          sudo apt-get update
          sudo apt-get install -y proj-bin libproj-dev
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  pypi_build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          # Need to clone everything to determine version from git.
          fetch-depth: 0

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          miniforge-version: latest
          channels: conda-forge,defaults
          channel-priority: strict
          show-channel-urls: true

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install -y setuptools wheel pip
          conda install -y --file requirements.txt
          conda install -y python-build cmake sqlite pip c-compiler cxx-compiler

      - name: Build minimal PROJ
        shell: bash -l {0}
        run: |
          PROJ_VERSION=9.8.0
          curl -L https://download.osgeo.org/proj/proj-${PROJ_VERSION}.tar.gz -o proj.tar.gz
          tar xzf proj.tar.gz
          cd proj-${PROJ_VERSION}

          mkdir build
          cd build

          # Minimal build - disable most features
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_PROJ=ON \
            -DENABLE_TIFF=OFF \
            -DCURL_ENABLED=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_PROJSYNC=OFF \
            -DBUILD_CCT=OFF \
            -DBUILD_CS2CS=OFF \
            -DBUILD_GEOD=OFF \
            -DBUILD_GIE=OFF \
            -DBUILD_PROJINFO=OFF

          cmake --build . --config Release
          cmake --install .

          cd ../..

          # Clean up after install.
          rm -r proj-${PROJ_VERSION}

      - name: Build wheel
        shell: bash -l {0}
        run: |
          python setup.py bdist_wheel

      - name: Install repair tools
        shell: bash -l {0}
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            pip install auditwheel patchelf
          elif [ "$RUNNER_OS" == "macOS" ]; then
            pip install delocate
          elif [ "$RUNNER_OS" == "Windows" ]; then
            pip install delvewheel
          fi

      - name: Repair wheel
        shell: bash -l {0}
        run: |
          mkdir -p wheelhouse
          if [ "$RUNNER_OS" == "Linux" ]; then
            auditwheel repair dist/*.whl -w wheelhouse/
          elif [ "$RUNNER_OS" == "macOS" ]; then
            delocate-wheel -w wheelhouse/ dist/*.whl
          elif [ "$RUNNER_OS" == "Windows" ]; then
            delvewheel repair dist/*.whl -w wheelhouse/
          fi

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ./wheelhouse/*.whl

  pypi_upload:
    needs: [pypi_build_sdist, pypi_build_wheels]
    runs-on: ubuntu-latest
    environment: Publish
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: 'wheels-*'
          merge-multiple: true
      - uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: 'sdist'
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
