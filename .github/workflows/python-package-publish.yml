name: Build, Test, and Publish

on:
  push:
    branches:
      - "testwheels*"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  pypi_build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need to clone everything to determine version from git.
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v3
        with:
          name: sdist
          path: dist/*.tar.gz

  pypi_build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          # Need to clone everything to determine version from git.
          fetch-depth: 0

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          miniforge-version: latest
          channels: conda-forge
          channel-priority: strict
          show-channel-urls: true

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install -y proj numpy setuptools wheel pip
          conda install -y --file requirements.txt --file requirements-dev.txt python-build proj pip

      - name: Build wheel
        shell: bash -l {0}
        run: |
          python setup.py bdist_wheel

      - name: Install repair tools
        shell: bash -l {0}
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            pip install auditwheel patchelf
          elif [ "$RUNNER_OS" == "macOS" ]; then
            pip install delocate
          elif [ "$RUNNER_OS" == "Windows" ]; then
            pip install delvewheel
          fi

      - name: Repair wheel
        shell: bash -l {0}
        run: |
          mkdir -p wheelhouse
          if [ "$RUNNER_OS" == "Linux" ]; then
            auditwheel repair dist/*.whl -w wheelhouse/
          elif [ "$RUNNER_OS" == "macOS" ]; then
            delocate-wheel -w wheelhouse/ dist/*.whl
          elif [ "$RUNNER_OS" == "Windows" ]; then
            delvewheel repair dist/*.whl -w wheelhouse/
          fi

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ./wheelhouse/*.whl

  pypi_upload:
    needs: [pypi_build_sdist, pypi_build_wheels]
    runs-on: ubuntu-latest
    environment: Publish
    if: github.event_name == "push" && startsWith(github.ref, "refs/tags/")
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: '*'
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
